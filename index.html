<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ApplyDirect — ATS Career Explorer</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:linear-gradient(120deg,#3b82f6,#6366f1,#0ea5e9);
min-height:100vh;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 40px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
}

.logo{
font-size:18px;
font-weight:700;
}

/* HERO */

.hero{
text-align:center;
padding:40px 20px 20px 20px;
}

.hero h1{
font-size:36px;
margin-bottom:6px;
}

/* SEARCH */

.controls{
display:flex;
gap:12px;
justify-content:center;
margin:20px 0;
}

.controls input,
.controls select{
padding:10px;
border:none;
border-radius:6px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px 40px 100px 40px;
}

.card{
background:rgba(255,255,255,.15);
border-radius:10px;
padding:16px;
backdrop-filter:blur(8px);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.card img{
width:34px;
margin-bottom:6px;
}

.card span{
font-size:13px;
color:#f1f5f9;
}

.card a{
display:inline-block;
margin-top:8px;
color:#0f172a;
background:white;
padding:6px 12px;
border-radius:6px;
text-decoration:none;
font-size:13px;
}

/* APPLY PANEL */

.panel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
color:black;
padding:25px;
display:none;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#0f172a;
overflow:hidden;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
gap:50px;
animation:scroll 30s linear infinite;
}

.ticker-item{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
color:white;
font-size:14px;
}

.ticker-item img{
width:26px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CURSOR */

.cursor{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
pointer-events:none;
z-index:9999;
}

/* PARTICLES */

.particle{
position:fixed;
width:6px;
height:6px;
border-radius:50%;
animation:fade 2s forwards;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(.2)}
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="nav">
<div class="logo">ApplyDirect</div>
</div>

<div class="hero">
<h1>Direct ATS Job Discovery</h1>
<p>Find company career portals instantly</p>
</div>

<div class="controls">
<input id="search" placeholder="Search company">
<select id="atsFilter">
<option value="">All ATS</option>
<option value="Workday">Workday</option>
<option value="Greenhouse">Greenhouse</option>
<option value="Lever">Lever</option>
</select>
</div>

<div class="grid" id="grid"></div>

<div class="panel" id="panel"></div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<script>

const companies=[

{name:"Walmart",domain:"walmart.com",ats:"Workday",url:"https://walmart.wd5.myworkdayjobs.com"},
{name:"Amazon",domain:"amazon.com",ats:"Workday",url:"https://amazon.jobs"},
{name:"Apple",domain:"apple.com",ats:"Workday",url:"https://jobs.apple.com"},
{name:"Microsoft",domain:"microsoft.com",ats:"Workday",url:"https://careers.microsoft.com"},
{name:"Adobe",domain:"adobe.com",ats:"Workday",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Netflix",domain:"netflix.com",ats:"Workday",url:"https://jobs.netflix.com"},
{name:"Salesforce",domain:"salesforce.com",ats:"Workday",url:"https://salesforce.wd1.myworkdayjobs.com"},
{name:"Accenture",domain:"accenture.com",ats:"Workday",url:"https://accenture.wd3.myworkdayjobs.com"},
{name:"Target",domain:"target.com",ats:"Workday",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Nordstrom",domain:"nordstrom.com",ats:"Workday",url:"https://nordstrom.wd5.myworkdayjobs.com"}

];

let activeATS="";

/* GRID */

function render(){

const q=document.getElementById("search").value.toLowerCase();

const filtered=companies.filter(c=>
c.name.toLowerCase().includes(q) &&
(activeATS=="" || c.ats==activeATS)
);

const grid=document.getElementById("grid");
grid.innerHTML="";

filtered.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
<h3>${c.name}</h3>
<span>${c.ats}</span>
<br>
<a href="${c.url}" target="_blank">Open Careers</a>
`;

grid.appendChild(card);

});

}

render();

document.getElementById("search").oninput=render;

document.getElementById("atsFilter").onchange=function(){
activeATS=this.value;
render();
};

/* TICKER */

const ticker=document.getElementById("tickerTrack");

companies.concat(companies).forEach(c=>{

const item=document.createElement("div");

item.className="ticker-item";

item.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
${c.name}
`;

item.onclick=()=>window.open(c.url);

ticker.appendChild(item);

});

/* CURSOR */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

const colors=["#f87171","#facc15","#4ade80","#60a5fa","#a78bfa"];

for(let i=0;i<3;i++){

const p=document.createElement("div");
p.className="particle";

p.style.background=colors[Math.floor(Math.random()*colors.length)];

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

}

});

</script>

</body>
</html>
