<!DOCTYPE html>
<html>
  <body>

<div class="loader" id="loader">
<div class="rocket-container">
<div class="rocket" id="rocket">🚀</div>
</div>
<div class="loader-text">Launching ATS Platform...</div>
</div>

<div class="cursor" id="cursor"></div>
<head>
<meta charset="UTF-8">
<title>Get A Job</title>

<style>
  /* LOADER */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#020617;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999999;
}

.rocket-area{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

.rocket{
font-size:70px;
transition:transform 1s ease;
}

.launch{
transform:translateY(-600px);
}

.fuel-bar{
width:120px;
height:10px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
}

.fuel-fill{
height:100%;
width:0%;
background:#fbbf24;
transition:width .4s;
}

.logo-stream{
position:absolute;
bottom:120px;
width:100%;
height:120px;
pointer-events:none;
}

.logo-fly{
position:absolute;
width:28px;
animation:fly 2.5s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(120px) scale(.5);
opacity:.5;
}

100%{
transform:translateY(-80px) scale(1);
opacity:1;
}
}

.loader-text{
margin-top:25px;
font-size:14px;
opacity:.7;
letter-spacing:2px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:linear-gradient(135deg,#0f172a,#2563eb,#38bdf8);
min-height:100vh;
display:flex;
color:white;
cursor:none;
overflow-x:hidden;
}

/* ---------------- LOADER ---------------- */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
transition:opacity .8s ease;
}

.rocket-container{
position:relative;
width:80px;
height:160px;
overflow:hidden;
}

.rocket{
font-size:80px;
position:absolute;
bottom:-80px;
left:0;
right:0;
margin:auto;
animation:fuel 6s linear forwards;
}

@keyframes fuel{
0%{bottom:-80px}
80%{bottom:20px}
}

.launch{
animation:launch 1s ease forwards;
}

@keyframes launch{
0%{transform:translateY(0)}
100%{transform:translateY(-500px)}
}

.loader-text{
margin-top:20px;
font-size:14px;
opacity:.7;
letter-spacing:2px;
}

/* ---------------- SIDEBAR ---------------- */

.sidebar{
width:200px;
background:#0f172a;
padding:30px 20px;
display:flex;
flex-direction:column;
gap:18px;
position:relative;
z-index:10;
}

.sidebar h2{color:#fbbf24}

.sidebar div{cursor:pointer;opacity:.85}

/* ---------------- MAIN ---------------- */

.main{
flex:1;
padding:30px;
position:relative;
z-index:10;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.header input{
padding:10px;
border-radius:6px;
border:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
padding-bottom:120px;
}

.card{
background:rgba(255,255,255,.15);
border-radius:10px;
padding:12px;
border:1px solid rgba(255,255,255,.15);
}

.card img{
width:28px;
margin-bottom:6px;
}

.card h3{font-size:14px}

.card span{font-size:12px}

.card a{
display:inline-block;
margin-top:6px;
background:white;
color:black;
padding:4px 8px;
border-radius:6px;
font-size:11px;
text-decoration:none;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:#020617;
display:flex;
align-items:center;
overflow:hidden;
z-index:1;
}

.ticker-track{
display:flex;
gap:40px;
animation:scroll 120s linear infinite;
}

.ticker:hover .ticker-track{animation-play-state:paused}

.ticker-item{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

.ticker-item img{width:22px}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CURSOR */

.cursor{
position:fixed;
width:10px;
height:10px;
background:#fbbf24;
border-radius:50%;
pointer-events:none;
z-index:9999;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(.2)}
}

</style>
</head>

<body>

<!-- LOADER -->

<div class="loader" id="loader">

<div class="rocket-container">
<div class="rocket" id="rocket">🚀</div>
</div>

<div class="loader-text">Launching ATS Platform...</div>

</div>

<div class="cursor" id="cursor"></div>

<div class="sidebar">
<h2>Apply Here</h2>
<div onclick="setATS('')">All</div>
<div onclick="setATS('Workday')">Workday</div>
<div onclick="setATS('Greenhouse')">Greenhouse</div>
<div onclick="setATS('Lever')">Lever</div>
</div>

<div class="main">

<div class="header">
<h1>ATS Home</h1>
<input id="search" placeholder="Search company">
</div>

<div class="grid" id="grid"></div>

</div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<script>

/* LOADER */

setTimeout(()=>{
document.getElementById("rocket").classList.add("launch")
},6000)

setTimeout(()=>{
const loader=document.getElementById("loader")
loader.style.opacity="0"
setTimeout(()=>loader.remove(),800)
},7000)

/* DATA */

const companies=[

{name:"Apple",domain:"apple.com",ats:"Workday",url:"https://jobs.apple.com"},
{name:"Amazon",domain:"amazon.com",ats:"Workday",url:"https://amazon.jobs"},
{name:"Microsoft",domain:"microsoft.com",ats:"Workday",url:"https://careers.microsoft.com"},
{name:"Adobe",domain:"adobe.com",ats:"Workday",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Walmart",domain:"walmart.com",ats:"Workday",url:"https://walmart.wd5.myworkdayjobs.com"},
{name:"Target",domain:"target.com",ats:"Workday",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Cisco",domain:"cisco.com",ats:"Workday",url:"https://cisco.wd1.myworkdayjobs.com"},
{name:"Intel",domain:"intel.com",ats:"Workday",url:"https://intel.wd1.myworkdayjobs.com"},
{name:"IBM",domain:"ibm.com",ats:"Workday",url:"https://ibm.wd1.myworkdayjobs.com"},
{name:"Oracle",domain:"oracle.com",ats:"Workday",url:"https://oracle.wd1.myworkdayjobs.com"},

{name:"Stripe",domain:"stripe.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/stripe"},
{name:"HubSpot",domain:"hubspot.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/hubspot"},
{name:"Dropbox",domain:"dropbox.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/dropbox"},

{name:"Notion",domain:"notion.so",ats:"Lever",url:"https://jobs.lever.co/notion"},
{name:"Figma",domain:"figma.com",ats:"Lever",url:"https://jobs.lever.co/figma"}

];

let activeATS="";

function render(){

const q=document.getElementById("search").value.toLowerCase();

const filtered=companies.filter(c =>
c.name.toLowerCase().includes(q) &&
(activeATS=="" || c.ats==activeATS)
);

const grid=document.getElementById("grid");
grid.innerHTML="";

filtered.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}" onerror="this.src='https://placehold.co/40x40'">
<h3>${c.name}</h3>
<span>${c.ats}</span>
<br>
<a href="${c.url}" target="_blank">Open Careers</a>
`;

grid.appendChild(card);

});

}

render();

document.getElementById("search").oninput=render;

function setATS(a){
activeATS=a;
render();
}

/* ticker */

const ticker=document.getElementById("tickerTrack");

companies.concat(companies).forEach(c=>{
const item=document.createElement("div");
item.className="ticker-item";
item.innerHTML=`<img src="https://logo.clearbit.com/${c.domain}">${c.name}`;
ticker.appendChild(item);
});

/* cursor */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

if(Math.random() < 0.2){

const p=document.createElement("div");
p.className="particle";
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

}

});

</script>

</body>
</html>
