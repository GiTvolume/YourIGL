<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaunchPad v2.3 — 250+ ATS Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #02040a;
  --bg-side: #080c14;
  --surface: #0f172a;
  --surface-hover: #1e293b;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.4);
  --gold: #fbbf24;
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  height: 100vh;
  overflow: hidden;
}

/* --- Loader --- */
#loader {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.5s;
}
.rocket-anim { font-size: 50px; animation: float 1s infinite alternate; }
@keyframes float { from { transform: translateY(0); } to { transform: translateY(-15px); } }

/* --- Sidebar --- */
#app { display: flex; height: 100vh; }
#sidebar {
  width: 260px; background: var(--bg-side); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 25px 15px;
}
.logo { font-family: var(--font-head); font-weight: 800; font-size: 22px; color: #fff; margin-bottom: 30px; padding-left: 10px; }
.logo span { color: var(--gold); }

.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 10px;
  color: var(--text-dim); cursor: pointer; transition: 0.2s; font-size: 13px; margin-bottom: 4px;
}
.nav-item:hover { background: var(--surface); color: #fff; }
.nav-item.active { background: var(--accent); color: #fff; box-shadow: 0 4px 15px var(--accent-glow); }

.nav-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: #475569; margin: 25px 0 10px 10px; }

/* --- Main --- */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
header {
  padding: 15px 30px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 15px; background: rgba(2, 4, 10, 0.8); backdrop-filter: blur(10px);
}
#search {
  flex: 1; max-width: 450px; background: var(--surface); border: 1px solid var(--border);
  padding: 10px 15px; border-radius: 8px; color: #fff; font-family: var(--font-mono); outline: none;
}

#content { flex: 1; overflow-y: auto; padding: 25px; scrollbar-width: thin; }

/* --- Company Cards --- */
.company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; transition: 0.2s; cursor: default; display: flex; flex-direction: column;
}
.card:hover { border-color: var(--accent); transform: translateY(-3px); background: var(--surface-hover); }

.card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }

/* Fixed Logo System */
.card-logo-box {
  width: 45px; height: 45px; border-radius: 8px; background: #fff;
  display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
}
.card-logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }

.avatar-fallback {
  width: 45px; height: 45px; border-radius: 8px; color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-weight: 800; font-size: 18px;
}

.card-title { font-family: var(--font-head); font-weight: 700; font-size: 15px; color: #fff; line-height: 1.2; }
.card-ind { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

.ats-badge {
  font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 3px 8px;
  background: rgba(255,255,255,0.05); border-radius: 4px; color: var(--accent);
  display: inline-block; margin-bottom: 15px; border: 1px solid var(--border);
}

.card-btns { display: flex; gap: 8px; margin-top: auto; }
.btn {
  flex: 1; padding: 8px; border-radius: 6px; border: none; font-family: var(--font-mono);
  font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; text-decoration: none;
}
.btn-track { background: transparent; border: 1px solid var(--border); color: #fff; }
.btn-track:hover { background: var(--border); }
.btn-apply { background: var(--accent); color: #fff; }
.btn-apply:hover { filter: brightness(1.2); }

/* --- Ticker --- */
.ticker-bar { height: 35px; background: #000; border-top: 1px solid var(--border); display: flex; align-items: center; overflow: hidden; }
.ticker-track { display: flex; white-space: nowrap; animation: scroll 120s linear infinite; gap: 30px; padding-left: 100%; }
@keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-100%); } }
.ticker-item { font-size: 10px; color: var(--text-dim); }

/* --- Toast --- */
#toast { position: fixed; bottom: 50px; right: 20px; background: var(--gold); color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 800; display: none; z-index: 1000; }
</style>
</head>
<body>

<div id="loader">
  <div class="rocket-anim">🚀</div>

<div id="toast">Saved to Tracker</div>

    <div id="content">

    </div>

    <div class="ticker-bar">

        name: `TechCorp ${i}`,
        domain: `techcorp${i}.com`,

        url: "#",

    });
}

/** 
 * UI ENGINE 
 */
function getHashColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `hsl(${Math.abs(hash) % 360}, 60%, 45%)`;
}

function render(data) {
  const grid = document.getElementById('grid');
  document.getElementById('result-count').innerText = `${data.length} Companies Found`;
  
  grid.innerHTML = data.map(c => {
    const logoUrl = `https://www.google.com/s2/favicons?sz=128&domain=${c.domain}`;
    const fallbackColor = getHashColor(c.name);

    return `
      <div class="card">
        <div class="card-top">
          <div class="card-logo-box">
            <img src="${logoUrl}" onerror="this.outerHTML='<div class=\'avatar-fallback\' style=\'background:${fallbackColor}\'>${c.name[0]}</div>'">
          </div>
          <div>
            <div class="card-title">${c.name}</div>
            <div class="card-ind">${c.industry}</div>
          </div>
        </div>
        <div>
          <span class="ats-badge">${c.ats}</span>
        </div>
        <div class="card-btns">
          <button class="btn btn-track" onclick="saveTrack('${c.name}')">Track</button>
          <a href="${c.url}" target="_blank" class="btn btn-apply">Apply ↗</a>
        </div>
      </div>
    `;
  }).join('');
}

function handleSearch() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = companies.filter(c => c.name.toLowerCase().includes(q) || c.industry.toLowerCase().includes(q));
  render(filtered);
}

function filterData(ats) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (ats === 'all') {
    document.getElementById('nav-all').classList.add('active');
    render(companies);
  } else {
    const filtered = companies.filter(c => c.ats === ats);
    render(filtered);
  }
}

function saveTrack(name) {
  const toast = document.getElementById('toast');
  toast.innerText = `Tracked ${name}`;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}

// Init Ticker
const ticker = document.getElementById('ticker');
ticker.innerHTML = companies.slice(0, 50).map(c => `<span class="ticker-item">${c.name} (${c.ats})</span>`).join(' • ');

// Init App
window.onload = () => {
  setTimeout(() => {
    document.getElementById('loader').style.opacity = '0';
    setTimeout(() => document.getElementById('loader').remove(), 500);
  }, 1500);
  render(companies);
};
</script>
