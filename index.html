<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ApplyDirect — ATS Career Explorer</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:#0b0b0b;
color:white;
}

/* NAVBAR */

.nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
border-bottom:1px solid #1c1c1c;
}

.logo{font-weight:700;font-size:18px}

.nav a{color:#aaa;margin-left:20px;text-decoration:none}

/* HERO */

.hero{
padding:80px 40px;
text-align:center;
}

.hero h1{font-size:42px;margin-bottom:10px}

.hero p{color:#888}

/* DASHBOARD */

.dashboard{padding:40px}

.controls{
display:flex;
gap:20px;
margin-bottom:30px;
}

.controls input,.controls select{
padding:10px;
border:none;
border-radius:6px;
background:#111;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:25px;
}

/* CARD */

.card{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #1c1c1c;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,.7);
}

.card img{width:40px;margin-bottom:10px}

.card span{color:#888;font-size:13px}

.card button{
margin-top:10px;
padding:6px 12px;
background:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.bookmark{
background:#222;
color:white;
margin-left:10px;
}

/* APPLY PANEL */

.applyPanel{
position:fixed;
right:0;
top:0;
height:100%;
width:420px;
background:#111;
border-left:1px solid #222;
padding:30px;
display:none;
}

.applyPanel h2{margin-bottom:10px}

.applyPanel a{
display:inline-block;
margin-top:15px;
background:white;
color:black;
padding:10px 16px;
border-radius:6px;
text-decoration:none;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
width:100%;
background:#0e0e0e;
border-top:1px solid #1f1f1f;
overflow:hidden;
height:70px;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
gap:60px;
animation:scroll 40s linear infinite;
}

.ticker-item{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
color:#ccc;
}

.ticker-item img{width:28px}

.ticker-item:hover{color:white}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CURSOR */

.cursor{
position:fixed;
width:12px;
height:12px;
background:white;
border-radius:50%;
pointer-events:none;
mix-blend-mode:difference;
}

.particle{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:fade 2s forwards;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(.2)}
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="nav">
<div class="logo">ApplyDirect</div>
<div>
<a>Dashboard</a>
<a>ATS Explorer</a>
<a>Bookmarks</a>
</div>
</div>

<div class="hero">
<h1>Direct ATS Job Discovery</h1>
<p>Find company career portals without job boards</p>
</div>

<div class="dashboard">

<div class="controls">
<input id="search" placeholder="Search company">

<select id="atsFilter">
<option value="">All ATS</option>
<option value="Workday">Workday</option>
<option value="Greenhouse">Greenhouse</option>
<option value="Lever">Lever</option>
<option value="iCIMS">iCIMS</option>
</select>
</div>

<div>
Upload Resume: <input type="file">
</div>

<br>

<div class="grid" id="grid"></div>

</div>

<div class="applyPanel" id="applyPanel"></div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<script>

/* COMPANY DATA */

const companies=[

{name:"Walmart",ats:"Workday",domain:"walmart.com",url:"https://walmart.wd5.myworkdayjobs.com"},
{name:"Target",ats:"Workday",domain:"target.com",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Adobe",ats:"Workday",domain:"adobe.com",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Accenture",ats:"Workday",domain:"accenture.com",url:"https://accenture.wd3.myworkdayjobs.com"},
{name:"Medtronic",ats:"Workday",domain:"medtronic.com",url:"https://medtronic.wd1.myworkdayjobs.com"},
{name:"State Street",ats:"Workday",domain:"statestreet.com",url:"https://statestreet.wd1.myworkdayjobs.com"},
{name:"VMware",ats:"Workday",domain:"vmware.com",url:"https://vmware.wd1.myworkdayjobs.com"},
{name:"Splunk",ats:"Workday",domain:"splunk.com",url:"https://splunk.wd5.myworkdayjobs.com"},
{name:"Okta",ats:"Workday",domain:"okta.com",url:"https://okta.wd5.myworkdayjobs.com"},
{name:"Zendesk",ats:"Greenhouse",domain:"zendesk.com",url:"https://boards.greenhouse.io/zendesk"},
{name:"Stripe",ats:"Lever",domain:"stripe.com",url:"https://jobs.lever.co/stripe"},
{name:"HubSpot",ats:"Greenhouse",domain:"hubspot.com",url:"https://boards.greenhouse.io/hubspot"}

];

/* GRID RENDER */

const grid=document.getElementById("grid");

function render(){

const q=document.getElementById("search").value.toLowerCase();
const ats=document.getElementById("atsFilter").value;

const filtered=companies.filter(c =>
c.name.toLowerCase().includes(q) &&
(ats=="" || c.ats==ats)
);

grid.innerHTML="";

filtered.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
<h3>${c.name}</h3>
<span>${c.ats}</span>
<br>
<button onclick="openPanel('${c.name}')">Open Careers</button>
<button class="bookmark" onclick="bookmark('${c.name}')">★</button>
`;

grid.appendChild(card);

});

}

render();

document.getElementById("search").oninput=render;
document.getElementById("atsFilter").onchange=render;

/* APPLY PANEL */

function openPanel(name){

const c=companies.find(x=>x.name===name);

const panel=document.getElementById("applyPanel");

panel.innerHTML=`
<h2>${c.name}</h2>
<p>ATS System: ${c.ats}</p>
<a href="${c.url}" target="_blank">Open Career Portal</a>
`;

panel.style.display="block";

}

/* BOOKMARK */

function bookmark(name){

let saved=JSON.parse(localStorage.getItem("saved"))||[];

saved.push(name);

localStorage.setItem("saved",JSON.stringify(saved));

alert("Bookmarked");

}

/* TICKER */

const ticker=document.getElementById("tickerTrack");

companies.forEach(c=>{

const item=document.createElement("div");
item.className="ticker-item";

item.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
${c.name}
`;

item.onclick=()=>openPanel(c.name);

ticker.appendChild(item);

});

/* CURSOR */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

const p=document.createElement("div");
p.className="particle";

p.style.left=e.clientX+"px;
p.style.top=e.clientY+"px;

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

});

</script>

</body>
</html>
