<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ATS House</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:linear-gradient(135deg,#0f172a,#2563eb,#38bdf8);
min-height:100vh;
display:flex;
color:white;
cursor:none;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:200px;
background:#0f172a;
padding:30px 20px;
display:flex;
flex-direction:column;
gap:18px;
}

.sidebar h2{
color:#fbbf24;
}

.sidebar div{
cursor:pointer;
opacity:.85;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.header input{
padding:10px;
border-radius:6px;
border:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:12px;
padding-bottom:120px;
}

.card{
background:rgba(255,255,255,.15);
border-radius:10px;
padding:12px;
border:1px solid rgba(255,255,255,.15);
}

.card img{
width:28px;
margin-bottom:6px;
}

.card h3{
font-size:14px;
}

.card span{
font-size:12px;
}

.card a{
display:inline-block;
margin-top:6px;
background:white;
color:black;
padding:4px 8px;
border-radius:6px;
font-size:11px;
text-decoration:none;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:#020617;
display:flex;
align-items:center;
overflow:hidden;
}

.ticker-track{
display:flex;
gap:40px;
animation:scroll 90s linear infinite;
}

.ticker:hover .ticker-track{
animation-play-state:paused;
}

.ticker-item{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

.ticker-item img{
width:22px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CURSOR */

.cursor{
position:fixed;
width:10px;
height:10px;
background:#fbbf24;
border-radius:50%;
pointer-events:none;
z-index:9999;
}

.particle{
position:fixed;
width:6px;
height:6px;
background:#fbbf24;
opacity:.9;
animation:fade 2s forwards;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(.2)}
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="sidebar">
<h2>Apply Here</h2>
<div onclick="setATS('')">All</div>
<div onclick="setATS('Workday')">Workday</div>
<div onclick="setATS('Greenhouse')">Greenhouse</div>
<div onclick="setATS('Lever')">Lever</div>
</div>

<div class="main">

<div class="header">
<h1>ATS Home</h1>
<input id="search" placeholder="Search company">
</div>

<div class="grid" id="grid"></div>

</div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<script>

const companies=[

{name:"Apple",domain:"apple.com",ats:"Workday",url:"https://jobs.apple.com"},
{name:"Amazon",domain:"amazon.com",ats:"Workday",url:"https://amazon.jobs"},
{name:"Microsoft",domain:"microsoft.com",ats:"Workday",url:"https://careers.microsoft.com"},
{name:"Adobe",domain:"adobe.com",ats:"Workday",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Walmart",domain:"walmart.com",ats:"Workday",url:"https://walmart.wd5.myworkdayjobs.com"},
{name:"Target",domain:"target.com",ats:"Workday",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Cisco",domain:"cisco.com",ats:"Workday",url:"https://cisco.wd1.myworkdayjobs.com"},
{name:"Intel",domain:"intel.com",ats:"Workday",url:"https://intel.wd1.myworkdayjobs.com"},
{name:"IBM",domain:"ibm.com",ats:"Workday",url:"https://ibm.wd1.myworkdayjobs.com"},
{name:"Oracle",domain:"oracle.com",ats:"Workday",url:"https://oracle.wd1.myworkdayjobs.com"},
{name:"Zoom",domain:"zoom.us",ats:"Workday",url:"https://zoom.wd5.myworkdayjobs.com"},
{name:"Dell",domain:"dell.com",ats:"Workday",url:"https://dell.wd1.myworkdayjobs.com"},
{name:"HP",domain:"hp.com",ats:"Workday",url:"https://hp.wd1.myworkdayjobs.com"},
{name:"Accenture",domain:"accenture.com",ats:"Workday",url:"https://accenture.wd3.myworkdayjobs.com"},
{name:"Nike",domain:"nike.com",ats:"Workday",url:"https://nike.wd5.myworkdayjobs.com"},
{name:"PepsiCo",domain:"pepsico.com",ats:"Workday",url:"https://pepsico.wd5.myworkdayjobs.com"},
{name:"CocaCola",domain:"coca-colacompany.com",ats:"Workday",url:"https://coca-colacompany.wd5.myworkdayjobs.com"},
{name:"Starbucks",domain:"starbucks.com",ats:"Workday",url:"https://starbucks.wd5.myworkdayjobs.com"},
{name:"McDonalds",domain:"mcdonalds.com",ats:"Workday",url:"https://mcdonalds.wd5.myworkdayjobs.com"},

{name:"Stripe",domain:"stripe.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/stripe"},
{name:"HubSpot",domain:"hubspot.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/hubspot"},
{name:"Dropbox",domain:"dropbox.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/dropbox"},
{name:"Shopify",domain:"shopify.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/shopify"},
{name:"Reddit",domain:"reddit.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/reddit"},
{name:"Coinbase",domain:"coinbase.com",ats:"Greenhouse",url:"https://boards.greenhouse.io/coinbase"},

{name:"Notion",domain:"notion.so",ats:"Lever",url:"https://jobs.lever.co/notion"},
{name:"Figma",domain:"figma.com",ats:"Lever",url:"https://jobs.lever.co/figma"},
{name:"Canva",domain:"canva.com",ats:"Lever",url:"https://jobs.lever.co/canva"},
{name:"Rippling",domain:"rippling.com",ats:"Lever",url:"https://jobs.lever.co/rippling"}

];

let activeATS="";

function render(){

const q=document.getElementById("search").value.toLowerCase();

const filtered=companies.filter(c =>
c.name.toLowerCase().includes(q) &&
(activeATS=="" || c.ats==activeATS)
);

const grid=document.getElementById("grid");
grid.innerHTML="";

filtered.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}" onerror="this.src='https://placehold.co/40x40'">
<h3>${c.name}</h3>
<span>${c.ats}</span>
<br>
<a href="${c.url}" target="_blank">Open Careers</a>
`;

grid.appendChild(card);

});

}

render();

document.getElementById("search").oninput=render;

function setATS(a){
activeATS=a;
render();
}

/* ticker */

const ticker=document.getElementById("tickerTrack");

companies.concat(companies).forEach(c=>{
const item=document.createElement("div");
item.className="ticker-item";
item.innerHTML=`<img src="https://logo.clearbit.com/${c.domain}">${c.name}`;
ticker.appendChild(item);
});

/* cursor */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

const p=document.createElement("div");
p.className="particle";
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);
});

</script>

</body>
</html>
