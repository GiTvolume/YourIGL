<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YourIGL | Movies & Games</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
}

/* cinematic background */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,.05), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,.05), transparent 40%);
animation:bgmove 15s infinite linear;
pointer-events:none;
}

@keyframes bgmove{
0%{transform:translate(0,0)}
50%{transform:translate(-40px,-40px)}
100%{transform:translate(0,0)}
}

h1{
margin-top:30px;
letter-spacing:2px;
}

/* search bar */

.search-container{
margin:20px;
}

input{
padding:10px;
border-radius:6px;
border:none;
width:260px;
}

/* grid layout */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:25px;
width:90%;
max-width:1200px;
}

/* cards */

.grid-item{
background:rgba(255,255,255,.05);
border-radius:10px;
padding:10px;
text-align:center;
transition:.35s;
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
}

.grid-item:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(255,255,255,.25);
}

.grid-item img{
width:100%;
border-radius:8px;
transition:.4s;
}

.grid-item:hover img{
transform:scale(1.05);
}

/* preview panel */

.preview{
position:fixed;
right:25px;
bottom:25px;
width:420px;
height:240px;
background:black;
border-radius:10px;
border:1px solid rgba(255,255,255,.2);
display:none;
overflow:hidden;
box-shadow:0 0 35px rgba(0,0,0,.9);
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

/* neon burst */

.color-burst{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
pointer-events:none;
transition:opacity .6s;
background:
radial-gradient(circle at 30% 30%, #ff004c, transparent 40%),
radial-gradient(circle at 70% 60%, #00eaff, transparent 40%),
radial-gradient(circle at 50% 80%, #ffe600, transparent 40%);
}

.color-burst.active{
opacity:.9;
}

</style>

</head>

<body>

<div class="color-burst" id="colorBurst"></div>

<h1>YourIGL Gallery</h1>

<div class="search-container">
<input type="text" id="search" placeholder="Search movies or games">
</div>

<div class="grid" id="gallery"></div>

<div class="preview" id="preview">
<img id="previewImage">
</div>

<script>

let items=[];

/* load data */

async function fetchData(){

const response=await fetch("data.json");
items=await response.json();
displayItems(items);

}

/* build gallery */

function displayItems(data){

const gallery=document.getElementById("gallery");
gallery.innerHTML="";

data.forEach(item=>{

const card=document.createElement("div");
card.classList.add("grid-item");

card.innerHTML=`
<a href="magnet:${item.magnet}">
<img src="${item.image}" alt="${item.title}">
<h3>${item.title}</h3>
</a>
`;

gallery.appendChild(card);

attachHover(card,item);

});

}

/* hover behavior */

function attachHover(card,item){

let timer;

card.addEventListener("mouseenter",()=>{

document.getElementById("preview").style.display="block";
document.getElementById("previewImage").src=item.image;

timer=setTimeout(()=>{
document.getElementById("colorBurst").classList.add("active");
},5000);

});

card.addEventListener("mouseleave",()=>{

clearTimeout(timer);

document.getElementById("colorBurst").classList.remove("active");

document.getElementById("preview").style.display="none";

});

}

/* search */

document.getElementById("search").addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=items.filter(i=>i.title.toLowerCase().includes(q));

displayItems(filtered);

});

/* start */

fetchData();

</script>

</body>
</html>
