<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ATS Career Directory</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{
padding:30px;
font-size:28px;
font-weight:600;
}

/* SEARCH */

.search{
padding:20px;
}

.search input{
padding:10px;
width:260px;
border-radius:6px;
border:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
padding:30px;
}

/* CARDS */

.card{
background:#111;
border-radius:10px;
padding:20px;
border:1px solid rgba(255,255,255,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

.card h3{
margin:0;
font-size:18px;
}

.card a{
display:inline-block;
margin-top:10px;
color:#4da3ff;
text-decoration:none;
font-size:14px;
}

/* CURSOR */

.cursor{
position:fixed;
width:14px;
height:14px;
background:#fff;
border-radius:50%;
pointer-events:none;
z-index:9999;
mix-blend-mode:difference;
}

/* PARTICLES */

.particle{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
pointer-events:none;
opacity:.8;
animation:fade 2s forwards;
}

@keyframes fade{
0%{opacity:.8;transform:scale(1)}
100%{opacity:0;transform:scale(.2)}
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="header">
ATS Direct Apply Directory
</div>

<div class="search">
<input type="text" id="search" placeholder="Search company">
</div>

<div class="grid" id="grid"></div>

<script>

/* DATASET */

const companies=[

{name:"Walmart",ats:"Workday",url:"https://walmart.wd5.myworkdayjobs.com/WalmartExternal"},
{name:"Amazon",ats:"Workday",url:"https://amazon.jobs"},
{name:"Apple",ats:"Workday",url:"https://jobs.apple.com"},
{name:"Microsoft",ats:"Workday",url:"https://jobs.careers.microsoft.com"},
{name:"Adobe",ats:"Workday",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Netflix",ats:"Workday",url:"https://jobs.netflix.com"},
{name:"Salesforce",ats:"Workday",url:"https://salesforce.wd1.myworkdayjobs.com"},
{name:"Accenture",ats:"Workday",url:"https://accenture.wd3.myworkdayjobs.com"},
{name:"Target",ats:"Workday",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Nordstrom",ats:"Workday",url:"https://nordstrom.wd5.myworkdayjobs.com"},
{name:"Medtronic",ats:"Workday",url:"https://medtronic.wd1.myworkdayjobs.com"},
{name:"StateStreet",ats:"Workday",url:"https://statestreet.wd1.myworkdayjobs.com"}

];

/* BUILD GRID */

const grid=document.getElementById("grid");

function render(data){

grid.innerHTML="";

data.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${c.name}</h3>
<p>${c.ats}</p>
<a href="${c.url}" target="_blank">Open Careers</a>
`;

grid.appendChild(card);

});

}

render(companies);

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=companies.filter(c=>c.name.toLowerCase().includes(q));

render(filtered);

});

/* CUSTOM CURSOR */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

const p=document.createElement("div");
p.className="particle";

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

});

</script>

</body>
</html>
