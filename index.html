<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaunchPad v2.2 — ATS Navigator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050810;
  --bg-side: #0c1120;
  --surface: #161f35;
  --surface-hover: #1e2945;
  --border: rgba(255, 255, 255, 0.08);
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.4);
  --gold: #f59e0b;
  --text: #f3f4f6;
  --text-dim: #94a3b8;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  height: 100vh;
  overflow: hidden;
}

/* --- Loader --- */
#loader {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 9999; transition: opacity 0.5s;
}
.rocket { font-size: 50px; animation: launch 0.8s infinite alternate; }
@keyframes launch { from { transform: translateY(0); } to { transform: translateY(-10px); } }

/* --- Sidebar --- */
#app { display: flex; height: 100vh; }
#sidebar {
  width: 280px; background: var(--bg-side); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 32px 20px;
}
.logo { font-family: var(--font-head); font-weight: 800; font-size: 24px; color: #fff; margin-bottom: 40px; }
.logo span { color: var(--accent); }

.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: var(--radius);
  color: var(--text-dim); cursor: pointer; transition: 0.2s; font-size: 14px; margin-bottom: 6px;
}
.nav-item:hover { background: var(--surface); color: #fff; }
.nav-item.active { background: var(--accent); color: #fff; box-shadow: 0 8px 20px var(--accent-glow); }

/* --- Main Content --- */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
header {
  padding: 24px 40px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 20px; background: rgba(5, 8, 16, 0.8); backdrop-filter: blur(12px);
}
#search-input {
  flex: 1; max-width: 500px; background: var(--surface); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 12px; color: #fff; font-family: var(--font-mono); outline: none;
}

#content { flex: 1; overflow-y: auto; padding: 40px; }
.view { display: none; animation: slideUp 0.4s ease-out; }
.view.active { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* --- Company Cards --- */
.company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; transition: 0.3s; cursor: pointer; position: relative;
}
.card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }

.card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }

/* Improved Logo Styling */
.logo-container {
  width: 54px; height: 54px; border-radius: 12px; background: #fff;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-shrink: 0;
}
.logo-container img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }

/* Placeholder Styling */
.logo-placeholder {
  width: 54px; height: 54px; border-radius: 12px; 
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head); font-weight: 800; font-size: 22px; color: #fff;
}

.card-title { font-family: var(--font-head); font-weight: 700; font-size: 18px; color: #fff; }
.card-meta { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

.ats-tag {
  display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700;
  margin-top: 15px; background: rgba(255,255,255,0.05); color: var(--accent); border: 1px solid var(--accent);
}

.btn {
  padding: 12px 20px; border-radius: 10px; border: none; font-family: var(--font-mono);
  font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 20px; }

/* --- Kanban --- */
.kanban { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; }
.kanban-col { min-width: 300px; background: rgba(255,255,255,0.03); border-radius: var(--radius); padding: 20px; }
.col-header { font-family: var(--font-head); font-weight: 800; font-size: 12px; margin-bottom: 20px; color: var(--text-dim); }

/* --- Toast & Modal --- */
#toast {
  position: fixed; bottom: 30px; right: 30px; background: var(--gold); color: #000;
  padding: 15px 25px; border-radius: 12px; font-weight: bold; display: none; z-index: 9999;
}
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
  z-index: 1000; display: none; align-items: center; justify-content: center;
}
.modal { background: var(--bg-side); border: 1px solid var(--border); padding: 40px; border-radius: 24px; width: 450px; }
.form-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 15px;
  border-radius: 12px; color: #fff; margin-bottom: 20px; outline: none;
}
</style>
</head>
<body>

<div id="loader">
  <div class="rocket">🚀</div>
  <p style="margin-top: 20px; color: var(--accent);">SYNCHRONIZING DATA...</p>
</div>

<div id="toast">Update Successful!</div>

<div id="app">
  <aside id="sidebar">
    <div class="logo">Launch<span>Pad</span></div>
    <div class="nav-item active" onclick="setView('companies')" id="nav-companies"><span>🏢</span> Directory</div>
    <div class="nav-item" onclick="setView('tracker')" id="nav-tracker"><span>📊</span> Tracker</div>
    <p style="font-size: 10px; color: var(--text-dim); margin: 30px 0 10px 10px; letter-spacing: 2px;">QUICK FILTER</p>
    <div class="nav-item" onclick="filterATS('Workday')"><span>⬡</span> Workday</div>
    <div class="nav-item" onclick="filterATS('Greenhouse')"><span>⬡</span> Greenhouse</div>
    <div class="nav-item" onclick="filterATS('Lever')"><span>⬡</span> Lever</div>
  </aside>

  <main id="main">
    <header>
      <input type="text" id="search-input" placeholder="Search companies or industries..." oninput="handleSearch()">
      <button class="btn" style="background: var(--surface); color: #fff;" onclick="location.reload()">Refresh App</button>
    </header>

    <div id="content">
      <section id="view-companies" class="view active">
        <div class="company-grid" id="company-grid"></div>
      </section>

      <section id="view-tracker" class="view">
        <div class="kanban" id="kanban-board"></div>
      </section>
    </div>
  </main>
</div>

<div id="modal-overlay" onclick="this.style.display='none'">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 style="margin-bottom: 20px; font-family: var(--font-head);">Track Job</h2>
    <input type="text" id="m-company" class="form-input" placeholder="Company Name">
    <input type="text" id="m-role" class="form-input" placeholder="Role (e.g. Designer)">
    <select id="m-status" class="form-input">
      <option value="Interested">Interested</option>
      <option value="Applied">Applied</option>
      <option value="Interview">Interview</option>
    </select>
    <button class="btn btn-primary" onclick="saveApp()">Save to Tracker</button>
  </div>
</div>

<script>
// Reliable Company Dataset
const companies = [
  { name: "Google", domain: "google.com", ats: "Other", ind: "Technology" },
  { name: "Apple", domain: "apple.com", ats: "Workday", ind: "Consumer Electronics" },
  { name: "Amazon", domain: "amazon.com", ats: "Workday", ind: "E-Commerce" },
  { name: "Meta", domain: "meta.com", ats: "Other", ind: "Social Media" },
  { name: "Netflix", domain: "netflix.com", ats: "Workday", ind: "Entertainment" },
  { name: "Stripe", domain: "stripe.com", ats: "Greenhouse", ind: "Fintech" },
  { name: "Airbnb", domain: "airbnb.com", ats: "Greenhouse", ind: "Hospitality" },
  { name: "Figma", domain: "figma.com", ats: "Lever", ind: "Design" },
  { name: "Notion", domain: "notion.so", ats: "Lever", ind: "Software" },
  { name: "Uber", domain: "uber.com", ats: "Other", ind: "Transportation" },
  { name: "Lyft", domain: "lyft.com", ats: "Greenhouse", ind: "Logistics" },
  { name: "Salesforce", domain: "salesforce.com", ats: "Workday", ind: "Cloud Software" },
  { name: "Spotify", domain: "spotify.com", ats: "Other", ind: "Music" },
  { name: "Slack", domain: "slack.com", ats: "Other", ind: "Productivity" },
  { name: "Reddit", domain: "reddit.com", ats: "Greenhouse", ind: "Social Media" },
  { name: "Snapchat", domain: "snap.com", ats: "Other", ind: "Technology" },
  { name: "Coinbase", domain: "coinbase.com", ats: "Greenhouse", ind: "Crypto" },
  { name: "Robinhood", domain: "robinhood.com", ats: "Greenhouse", ind: "Fintech" },
  { name: "Databricks", domain: "databricks.com", ats: "Greenhouse", ind: "Data AI" },
  { name: "Pinterest", domain: "pinterest.com", ats: "Lever", ind: "Media" },
  { name: "LinkedIn", domain: "linkedin.com", ats: "Other", ind: "Professional Network" },
  { name: "TikTok", domain: "tiktok.com", ats: "Other", ind: "Video Media" },
  { name: "OpenAI", domain: "openai.com", ats: "Other", ind: "Artificial Intelligence" },
  { name: "Anthropic", domain: "anthropic.com", ats: "Other", ind: "AI Safety" }
];

let trackedApps = JSON.parse(localStorage.getItem('apps_v2') || '[]');

// Utility: Generate a consistent color based on string
function getHashColor(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = str.charCodeAt(i) + ((hash << 5) - hash);
  }
  return `hsl(${Math.abs(hash) % 360}, 65%, 50%)`;
}

function renderGrid(data) {
  const grid = document.getElementById('company-grid');
  grid.innerHTML = data.map(c => {
    // We use Google Favicon service (sz=128 for high quality)
    const logoUrl = `https://www.google.com/s2/favicons?sz=128&domain=${c.domain}`;
    const bgColor = getHashColor(c.name);

    return `
      <div class="card" onclick="openModal('${c.name}')">
        <div class="card-header">
          <div class="logo-container">
            <img src="${logoUrl}" 
                 onerror="this.parentElement.innerHTML='<div class=\'logo-placeholder\' style=\'background:${bgColor}\'>${c.name[0]}</div>'">
          </div>
          <div>
            <div class="card-title">${c.name}</div>
            <div class="card-meta">${c.ind}</div>
          </div>
        </div>
        <span class="ats-tag">${c.ats}</span>
        <button class="btn btn-primary">Track Application</button>
      </div>
    `;
  }).join('');
}

function setView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('nav-' + view).classList.add('active');
  if(view === 'tracker') renderTracker();
}

function handleSearch() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = companies.filter(c => c.name.toLowerCase().includes(query) || c.ind.toLowerCase().includes(query));
  renderGrid(filtered);
}

function filterATS(ats) {
  setView('companies');
  const filtered = companies.filter(c => c.ats === ats);
  renderGrid(filtered);
}

function openModal(name) {
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('m-company').value = name;
}

function saveApp() {
  const app = {
    company: document.getElementById('m-company').value,
    role: document.getElementById('m-role').value,
    status: document.getElementById('m-status').value,
    id: Date.now()
  };
  trackedApps.push(app);
  localStorage.setItem('apps_v2', JSON.stringify(trackedApps));
  document.getElementById('modal-overlay').style.display = 'none';
  showToast("Application Tracked!");
}

function renderTracker() {
  const board = document.getElementById('kanban-board');
  const statuses = ['Interested', 'Applied', 'Interview'];
  
  board.innerHTML = statuses.map(s => {
    const items = trackedApps.filter(a => a.status === s);
    return `
      <div class="kanban-col">
        <div class="col-header">${s.toUpperCase()} (${items.length})</div>
        ${items.map(i => `
          <div class="card" style="margin-bottom:15px; padding:15px;">
            <div style="font-weight:bold; color:#fff;">${i.company}</div>
            <div style="font-size:12px; color:var(--text-dim);">${i.role}</div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Init
window.onload = () => {
  setTimeout(() => document.getElementById('loader').style.opacity = '0', 1000);
  setTimeout(() => document.getElementById('loader').remove(), 1500);
  renderGrid(companies);
};
</script>

</body>
</html>
