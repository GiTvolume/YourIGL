<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ApplyDirect — ATS Explorer</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:linear-gradient(120deg,#2563eb,#6366f1,#0ea5e9);
min-height:100vh;
color:white;
display:flex;
cursor:none;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:rgba(0,0,0,.35);
padding:30px 20px;
display:flex;
flex-direction:column;
gap:20px;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.sidebar div{
cursor:pointer;
opacity:.8;
}

.sidebar div:hover{
opacity:1;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header input{
padding:10px;
border:none;
border-radius:6px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:16px;
margin-bottom:25px;
}

.stat{
background:rgba(255,255,255,.2);
padding:15px;
border-radius:8px;
backdrop-filter:blur(8px);
}

/* FILTER */

.filters{
margin-bottom:15px;
display:flex;
gap:10px;
}

.filters button{
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:16px;
padding-bottom:100px;
}

.card{
background:rgba(255,255,255,.2);
padding:14px;
border-radius:8px;
backdrop-filter:blur(8px);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:32px;
}

.card a{
display:inline-block;
margin-top:6px;
background:white;
color:black;
padding:5px 10px;
border-radius:6px;
text-decoration:none;
font-size:13px;
}

/* APPLY PANEL */

.panel{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
color:black;
padding:25px;
display:none;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:#111827;
display:flex;
align-items:center;
overflow:hidden;
}

.ticker-track{
display:flex;
gap:50px;
animation:scroll 28s linear infinite;
}

.ticker-item{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
}

.ticker-item img{
width:24px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CURSOR */

.cursor{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
pointer-events:none;
z-index:9999;
}

/* PARTICLES */

.particle{
position:fixed;
opacity:.9;
pointer-events:none;
animation:fade 2s forwards;
}

.square{width:6px;height:6px;background:white}
.circle{width:6px;height:6px;background:white;border-radius:50%}
.triangle{
width:0;height:0;
border-left:4px solid transparent;
border-right:4px solid transparent;
border-bottom:7px solid white
}
.diamond{width:6px;height:6px;background:white;transform:rotate(45deg)}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(.3)}
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="sidebar">
<h2>ApplyDirect</h2>
<div>Dashboard</div>
<div>ATS Explorer</div>
<div>Bookmarks</div>
</div>

<div class="main">

<div class="header">
<h1>ATS Explorer</h1>
<input id="search" placeholder="Search company">
</div>

<div class="stats">
<div class="stat"><b id="companyCount"></b><br>Companies</div>
<div class="stat"><b>4</b><br>ATS Platforms</div>
<div class="stat"><b id="bookmarkCount">0</b><br>Bookmarks</div>
<div class="stat"><b id="resumeStatus">No</b><br>Resume Uploaded</div>
</div>

<div class="filters">
<button onclick="setATS('')">All</button>
<button onclick="setATS('Workday')">Workday</button>
<button onclick="setATS('Greenhouse')">Greenhouse</button>
<button onclick="setATS('Lever')">Lever</button>
</div>

Upload Resume: <input type="file" id="resumeUpload">

<div class="grid" id="grid"></div>

</div>

<div class="panel" id="panel"></div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<script>

/* COMPANY DATA */

const companies=[
{name:"Walmart",domain:"walmart.com",ats:"Workday",url:"https://walmart.wd5.myworkdayjobs.com"},
{name:"Amazon",domain:"amazon.com",ats:"Workday",url:"https://amazon.jobs"},
{name:"Apple",domain:"apple.com",ats:"Workday",url:"https://jobs.apple.com"},
{name:"Microsoft",domain:"microsoft.com",ats:"Workday",url:"https://careers.microsoft.com"},
{name:"Adobe",domain:"adobe.com",ats:"Workday",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Netflix",domain:"netflix.com",ats:"Workday",url:"https://jobs.netflix.com"},
{name:"Salesforce",domain:"salesforce.com",ats:"Workday",url:"https://salesforce.wd1.myworkdayjobs.com"},
{name:"Accenture",domain:"accenture.com",ats:"Workday",url:"https://accenture.wd3.myworkdayjobs.com"},
{name:"Target",domain:"target.com",ats:"Workday",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Nordstrom",domain:"nordstrom.com",ats:"Workday",url:"https://nordstrom.wd5.myworkdayjobs.com"}
];

let activeATS="";

document.getElementById("companyCount").innerText=companies.length;

/* GRID */

function render(){

const q=document.getElementById("search").value.toLowerCase();

const filtered=companies.filter(c =>
c.name.toLowerCase().includes(q) &&
(activeATS=="" || c.ats==activeATS)
);

const grid=document.getElementById("grid");
grid.innerHTML="";

filtered.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
<h3>${c.name}</h3>
<span>${c.ats}</span>
<br>
<a href="${c.url}" target="_blank">Open Careers</a>
`;

grid.appendChild(card);

});

}

render();

document.getElementById("search").oninput=render;

function setATS(a){
activeATS=a;
render();
}

/* RESUME */

document.getElementById("resumeUpload").onchange=function(){
document.getElementById("resumeStatus").innerText="Yes";
};

/* TICKER */

const ticker=document.getElementById("tickerTrack");

companies.concat(companies).forEach(c=>{

const item=document.createElement("div");
item.className="ticker-item";

item.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
${c.name}
`;

item.onclick=()=>window.open(c.url);

ticker.appendChild(item);

});

/* CURSOR */

const cursor=document.getElementById("cursor");

const shapes=["square","circle","triangle","diamond"];

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

for(let i=0;i<3;i++){

const p=document.createElement("div");
p.classList.add("particle");

const shape=shapes[Math.floor(Math.random()*shapes.length)];
p.classList.add(shape);

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

}

});

</script>

</body>
</html>
