<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaunchPad — Company Explorer</title>

<style>
:root {
  --bg:#0B0F14;
  --surface:#111827;
  --border:rgba(255,255,255,0.06);
  --text:#E5E7EB;
  --text2:#6B7280;
  --accent:#2563EB;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:var(--bg);
  color:var(--text);
  font-family: system-ui, -apple-system;
}

#app {
  max-width:1000px;
  margin:0 auto;
  padding:20px;
}

/* TOP */
.topbar {
  display:flex;
  gap:12px;
  margin-bottom:20px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
}

/* ALPHABET */
.alphabet {
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:16px;
}

.alphabet span {
  font-size:12px;
  color:var(--text2);
  cursor:pointer;
}

.alphabet span:hover {
  color:white;
}

/* LIST */
.alpha-header {
  margin-top:20px;
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--text2);
}

.company-row {
  display:flex;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid var(--border);
}

.company-row img {
  width:28px;
  height:28px;
  margin-right:12px;
}

.company-meta {
  flex:1;
}

.company-name {
  font-weight:600;
}

.company-sub {
  font-size:11px;
  color:var(--text2);
}

.company-actions button {
  margin-left:8px;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  cursor:pointer;
}

.company-actions button.primary {
  background:var(--accent);
  border-color:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div id="app">

  <div class="topbar">
    <input id="search" placeholder="Search companies..." oninput="render()">
  </div>

  <div class="alphabet" id="alphabet"></div>

  <div id="list"></div>

</div>

<script>

// SAMPLE DATA (your full dataset still works)
const companies = [
  {name:"Apple",domain:"apple.com",hq:"Cupertino, CA",url:"https://jobs.apple.com"},
  {name:"Amazon",domain:"amazon.com",hq:"Seattle, WA",url:"https://amazon.jobs"},
  {name:"Microsoft",domain:"microsoft.com",hq:"Redmond, WA",url:"https://careers.microsoft.com"},
  {name:"Adobe",domain:"adobe.com",hq:"San Jose, CA",url:"https://adobe.com"},
  {name:"Nike",domain:"nike.com",hq:"Beaverton, OR",url:"https://nike.com"}
];

// LOGO
function logo(domain){
  return `https://logo.clearbit.com/${domain}`;
}

// GROUP
function group(data){
  const map={};

  data.forEach(c=>{
    const l=c.name[0].toUpperCase();
    if(!map[l]) map[l]=[];
    map[l].push(c);
  });

  return Object.keys(map).sort().map(l=>({
    letter:l,
    items:map[l].sort((a,b)=>a.name.localeCompare(b.name))
  }));
}

// ALPHABET UI
function renderAlphabet(groups){
  const el=document.getElementById("alphabet");
  el.innerHTML=groups.map(g=>`<span onclick="scrollToLetter('${g.letter}')">${g.letter}</span>`).join("");
}

// SCROLL
function scrollToLetter(letter){
  document.getElementById("section-"+letter)?.scrollIntoView({behavior:"smooth"});
}

// MAIN RENDER
function render(){
  const q=document.getElementById("search").value.toLowerCase();

  const filtered=companies.filter(c=>c.name.toLowerCase().includes(q));

  const groups=group(filtered);

  renderAlphabet(groups);

  const container=document.getElementById("list");
  container.innerHTML="";

  groups.forEach(g=>{
    const section=document.createElement("div");

    section.innerHTML=`
      <div class="alpha-header" id="section-${g.letter}">${g.letter}</div>
      ${g.items.map(c=>`
        <div class="company-row">
          <img src="${logo(c.domain)}" onerror="this.style.display='none'">
          <div class="company-meta">
            <div class="company-name">${c.name}</div>
            <div class="company-sub">${c.hq}</div>
          </div>
          <div class="company-actions">
            <button onclick="window.open('${c.url}')">Apply</button>
            <button class="primary">Track</button>
          </div>
        </div>
      `).join("")}
    `;

    container.appendChild(section);
  });
}

render();

</script>

</body>
</html>
