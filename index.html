<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>ApplyDirect — ATS Career Explorer</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter,system-ui;
background:linear-gradient(135deg,#1e293b,#334155,#475569);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* NAVBAR */

.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-weight:700;
font-size:18px;
}

.nav input{
padding:10px;
border-radius:6px;
border:none;
background:#111827;
color:white;
width:260px;
}

/* ANALYTICS PANELS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:30px 40px;
}

.stat{
background:rgba(255,255,255,.06);
border-radius:10px;
padding:18px;
border:1px solid rgba(255,255,255,.08);
}

.stat h2{
font-size:26px;
}

.stat span{
color:#cbd5e1;
font-size:13px;
}

/* FILTERS */

.filters{
padding:0 40px 20px 40px;
display:flex;
gap:10px;
}

.filters button{
background:#111827;
border:none;
padding:8px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

.filters button:hover{
background:#374151;
}

/* COMPANY GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
padding:0 40px 120px 40px;
}

.card{
background:rgba(255,255,255,.06);
border-radius:10px;
padding:16px;
border:1px solid rgba(255,255,255,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

.card img{
width:34px;
margin-bottom:6px;
}

.card span{
font-size:13px;
color:#cbd5e1;
}

.card button{
margin-top:8px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:white;
color:black;
}

/* APPLY PANEL */

.panel{
position:fixed;
right:0;
top:0;
width:360px;
height:100%;
background:#0f172a;
border-left:1px solid rgba(255,255,255,.08);
padding:28px;
display:none;
}

/* TICKER */

.ticker{
position:fixed;
bottom:0;
width:100%;
height:70px;
background:rgba(0,0,0,.45);
border-top:1px solid rgba(255,255,255,.1);
overflow:hidden;
display:flex;
align-items:center;
}

.ticker-track{
display:flex;
gap:60px;
animation:scroll 35s linear infinite;
}

.ticker-item{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
color:#e2e8f0;
font-size:14px;
}

.ticker-item img{
width:24px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

/* CURSOR */

.cursor{
position:fixed;
width:8px;
height:8px;
background:white;
border-radius:50%;
pointer-events:none;
z-index:9999;
mix-blend-mode:difference;
}

/* COLOURFUL PARTICLES */

.particle{
position:fixed;
width:3px;
height:3px;
border-radius:50%;
animation:fade 2s forwards;
}

@keyframes fade{
0%{opacity:1}
100%{opacity:0;transform:scale(.2)}
}

</style>

</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="nav">
<div class="logo">ApplyDirect</div>
<input id="search" placeholder="Search company">
</div>

<div class="stats">

<div class="stat">
<h2 id="companyCount"></h2>
<span>Companies Indexed</span>
</div>

<div class="stat">
<h2>4</h2>
<span>ATS Platforms</span>
</div>

<div class="stat">
<h2 id="bookmarkCount">0</h2>
<span>Bookmarks</span>
</div>

<div class="stat">
<h2 id="resumeStatus">No</h2>
<span>Resume Uploaded</span>
</div>

</div>

<div class="filters">
<button onclick="filterATS('')">All</button>
<button onclick="filterATS('Workday')">Workday</button>
<button onclick="filterATS('Greenhouse')">Greenhouse</button>
<button onclick="filterATS('Lever')">Lever</button>
</div>

<div style="padding:0 40px 20px 40px">
Upload Resume: <input type="file" id="resumeUpload">
</div>

<div class="grid" id="grid"></div>

<div class="panel" id="panel"></div>

<div class="ticker">
<div class="ticker-track" id="tickerTrack"></div>
</div>

<script>

const companies=[

{name:"Walmart",domain:"walmart.com",ats:"Workday",url:"https://walmart.wd5.myworkdayjobs.com"},
{name:"Amazon",domain:"amazon.com",ats:"Workday",url:"https://amazon.jobs"},
{name:"Apple",domain:"apple.com",ats:"Workday",url:"https://jobs.apple.com"},
{name:"Microsoft",domain:"microsoft.com",ats:"Workday",url:"https://careers.microsoft.com"},
{name:"Adobe",domain:"adobe.com",ats:"Workday",url:"https://adobe.wd5.myworkdayjobs.com"},
{name:"Netflix",domain:"netflix.com",ats:"Workday",url:"https://jobs.netflix.com"},
{name:"Salesforce",domain:"salesforce.com",ats:"Workday",url:"https://salesforce.wd1.myworkdayjobs.com"},
{name:"Accenture",domain:"accenture.com",ats:"Workday",url:"https://accenture.wd3.myworkdayjobs.com"},
{name:"Target",domain:"target.com",ats:"Workday",url:"https://target.wd5.myworkdayjobs.com"},
{name:"Nordstrom",domain:"nordstrom.com",ats:"Workday",url:"https://nordstrom.wd5.myworkdayjobs.com"},
{name:"Medtronic",domain:"medtronic.com",ats:"Workday",url:"https://medtronic.wd1.myworkdayjobs.com"},
{name:"StateStreet",domain:"statestreet.com",ats:"Workday",url:"https://statestreet.wd1.myworkdayjobs.com"}

];

let activeATS="";

/* COUNTS */

document.getElementById("companyCount").innerText=companies.length;

/* GRID */

function render(){

const q=document.getElementById("search").value.toLowerCase();

const filtered=companies.filter(c=>
c.name.toLowerCase().includes(q) &&
(activeATS=="" || c.ats==activeATS)
);

const grid=document.getElementById("grid");
grid.innerHTML="";

filtered.forEach(c=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
<h3>${c.name}</h3>
<span>${c.ats}</span>
<br>
<button onclick="openPanel('${c.name}')">Apply</button>
`;

grid.appendChild(card);

});

}

render();

document.getElementById("search").oninput=render;

function filterATS(a){
activeATS=a;
render();
}

/* APPLY PANEL */

function openPanel(name){

const c=companies.find(x=>x.name===name);

const panel=document.getElementById("panel");

panel.innerHTML=`
<h2>${c.name}</h2>
<p>ATS: ${c.ats}</p>
<a href="${c.url}" target="_blank">Open Careers</a>
`;

panel.style.display="block";

}

/* RESUME */

document.getElementById("resumeUpload").onchange=function(){
document.getElementById("resumeStatus").innerText="Yes";
};

/* TICKER */

const ticker=document.getElementById("tickerTrack");

companies.concat(companies).forEach(c=>{

const item=document.createElement("div");

item.className="ticker-item";

item.innerHTML=`
<img src="https://logo.clearbit.com/${c.domain}">
${c.name}
`;

item.onclick=()=>openPanel(c.name);

ticker.appendChild(item);

});

/* CURSOR */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{

cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";

for(let i=0;i<2;i++){

const p=document.createElement("div");
p.className="particle";

const colors=["#ff6b6b","#facc15","#38bdf8","#a78bfa","#4ade80"];

p.style.background=colors[Math.floor(Math.random()*colors.length)];

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),2000);

}

});

</script>

</body>
</html>
