<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies & Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-top: 20px;
        }
        .search-container {
            margin: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            padding: 10px;
        }
        .grid-item {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .grid-item img {
            max-width: 100%;
            border-radius: 8px;
        }
        .filter {
            margin-top: 10px;
        }
    </style>
    <style>

body {
background: radial-gradient(circle at 20% 20%, #1a1a1a 0%, #000 60%);
color:white;
font-family: Arial, sans-serif;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image: repeating-linear-gradient(
45deg,
rgba(255,255,255,0.04) 0px,
rgba(255,255,255,0.04) 2px,
transparent 2px,
transparent 40px
);
pointer-events:none;
}

.gallery-item{
background:rgba(255,255,255,0.05);
border-radius:12px;
padding:20px;
margin:25px auto;
width:350px;
transition:all .4s ease;
border:1px solid rgba(255,255,255,0.1);
}

.gallery-item:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,255,255,0.3);
}

.color-burst{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
pointer-events:none;
transition:opacity .6s;
background:
radial-gradient(circle at 30% 30%, #ff004c, transparent 40%),
radial-gradient(circle at 70% 60%, #00eaff, transparent 40%),
radial-gradient(circle at 50% 80%, #ffea00, transparent 40%);
}

.color-burst.active{
opacity:.9;
}

</style>
</head>
<body>
    <div class="color-burst" id="colorBurst"></div>
    <h1>Enhanced Gallery</h1>
    <div class="search-container">
        <input type="text" id="search" placeholder="Search by title...">
        <select id="yearFilter" class="filter">
            <option value="">Filter by year</option>
            <!-- Year options will be populated here -->
        </select>
    </div>
    <div class="grid" id="gallery"></div>

    <script>
        async function fetchData() {
            const response = await fetch('data.json');
            const items = await response.json();
            displayItems(items);
        }

        function displayItems(items) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            items.forEach(item => {
                const gridItem = document.createElement('div');
                gridItem.classList.add('grid-item');
                gridItem.innerHTML = `
                    <a href="magnet:${item.magnet}">
                        <img src="${item.image}" alt="${item.title}">
                        <h3>${item.title}</h3>
                    </a>
                `;
                gallery.appendChild(gridItem);
            });
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const filteredItems = items.filter(item => item.title.toLowerCase().includes(query));
            displayItems(filteredItems);
        });

        // Initial data load
        fetchData();
    </script>
    <script>

let timer;

document.querySelectorAll(".gallery-item").forEach(item => {

item.addEventListener("mouseenter", () => {

timer = setTimeout(() => {
document.getElementById("colorBurst").classList.add("active");
}, 5000);

});

item.addEventListener("mouseleave", () => {

clearTimeout(timer);
document.getElementById("colorBurst").classList.remove("active");

});

});

</script>
</body>
</html>
